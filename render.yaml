services:
  - type: web
    name: nyumba-directly
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: >-
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate &&
      python -c "
      import django, os;
      os.environ.setdefault('DJANGO_SETTINGS_MODULE','nyumba.settings');
      django.setup();
      from apps.accounts.models import User;
      User.objects.filter(phone_number='+254700000000').exists() or User.objects.create_superuser(phone_number='+254700000000', password='NyumbaAdmin2026!', full_name='Admin')
      "
    startCommand: "gunicorn nyumba.wsgi --workers 2 --bind 0.0.0.0:$PORT --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: nyumba-directly.onrender.com,.onrender.com,localhost,127.0.0.1
      - key: AT_USERNAME
        value: sandbox
      - key: AT_SENDER_ID
        value: NyumbaDirect
      - key: MPESA_ENV
        value: sandbox
      - key: MPESA_SHORTCODE
        value: "174379"
      - key: FRONTEND_URL
        value: http://localhost:3000
      - key: DATABASE_URL
        fromDatabase:
          name: nyumba-db
          property: connectionString

databases:
  - name: nyumba-db
    databaseName: nyumba
    plan: free
